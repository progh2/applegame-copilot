name: 리팩터링/정리
description: 구조 개선 또는 유지보수 작업을 등록합니다.
title: "[Refactor] "
labels: ["type:refactor"]
body:
  - type: dropdown
    id: target_milestone
    attributes:
      label: 목표 마일스톤
      options:
        - M0 - Foundation
        - M1 - Core Gameplay
        - M2 - UX & Audio Polish
    validations:
      required: true
  - type: textarea
    id: current_problem
    attributes:
      label: 현재 문제점
      placeholder: 복잡도/중복/유지보수 문제
    validations:
      required: true
  - type: textarea
    id: refactor_scope
    attributes:
      label: 작업 범위
      placeholder: "- [ ] 파일/모듈 A\n- [ ] 파일/모듈 B"
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: 리스크 및 회귀 포인트
      placeholder: 테스트/검증 포인트
    validations:
      required: true
