<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사과 합 10 퍼즐</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <main class="game-shell">
      <header class="hud">
        <h1>사과 합 10 퍼즐</h1>
        <div class="stats">
          <div class="stat"><span>점수</span><strong id="score">0</strong></div>
          <div class="stat"><span>현재 합</span><strong id="sum">0</strong></div>
          <div class="stat"><span>최고 점수</span><strong id="best">0</strong></div>
        </div>
        <div class="controls">
          <button id="startBtn" type="button">게임 시작</button>
          <button id="pauseBtn" type="button">멈추기</button>
          <button id="restartBtn" type="button">재시작</button>
          <button id="muteBtn" type="button">사운드 끄기</button>
        </div>
      </header>

      <section class="board-wrap" aria-label="사과 숫자 퍼즐 보드">
        <div id="game-root"></div>
      </section>

      <p class="hint">드래그로 숫자 사과를 연결하고, 합이 정확히 10이면 사과가 터집니다.</p>
    </main>

    <script src="game.js"></script>
  </body>
</html>
